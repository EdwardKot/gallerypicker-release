<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gallery Picker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header id="header">
        <div class="header-left">
            <h1>Gallery Picker</h1>
        </div>
        <div class="header-center">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All <span id="count-all">0</span></button>
                <button class="filter-btn" data-filter="liked">Liked <span id="count-liked">0</span></button>
            </div>
        </div>
        <div class="header-right">
            <button id="btn-settings" class="tool-btn" title="Settings">⚙ Settings</button>
            <button id="btn-rescan" class="tool-btn" title="Rescan photo library">⟳ Rescan</button>
            <button id="btn-clear-selection" class="tool-btn" style="display: none;" title="Clear current selection">✕ Clear</button>
            <button id="btn-download-liked" class="tool-btn" title="Download selected or liked photos">⬇ Download</button>
            <div class="thumb-size-control">
                <label>Size</label>
                <input type="range" id="thumb-size-slider" min="120" max="400" value="200" step="20">
            </div>
        </div>
    </header>

    <main id="gallery">
        <div id="photo-grid" class="photo-grid"></div>
        <div id="loading" class="loading">Loading...</div>
        <div id="empty-state" class="empty-state" style="display:none">
            <p>No photos found.</p>
            <p>Check your photo root directory and try rescanning.</p>
        </div>
    </main>

    <div id="viewer" class="viewer" style="display:none">
        <div class="viewer-top-bar">
            <span id="viewer-filename"></span>
            <span id="viewer-position"></span>
            <span id="viewer-liked" class="viewer-liked-indicator"></span>
        </div>
        <div class="viewer-image-container">
            <img id="viewer-img" src="" alt="Photo viewer">
        </div>
        <div class="viewer-bottom-bar">
            <div class="viewer-bottom-left">
                <button id="viewer-load-original" class="viewer-load-original-btn" title="Load high-res original image (2 or O)">Load Original</button>
                <button id="viewer-download" class="viewer-download-btn" title="Download original image (D)">Download</button>
            </div>
            <span id="viewer-filename-bottom" class="viewer-filename-bottom"></span>
            <div class="viewer-bottom-right">
                <button class="viewer-nav-btn" id="viewer-btn-prev" title="Previous (←)">←</button>
                <button class="viewer-nav-btn" id="viewer-btn-next" title="Next (→)">→</button>
            </div>
        </div>
        <button id="viewer-close" class="viewer-close-btn" title="Close (Esc)">✕</button>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Download Progress Overlay -->
    <div id="download-overlay" class="download-overlay" style="display:none">
        <div class="download-panel">
            <div class="download-header">
                <h2>Downloading…</h2>
                <button id="download-cancel" class="download-cancel-btn">✕ Cancel</button>
            </div>
            <div class="download-body">
                <div class="download-progress-text">
                    <span id="download-current">0</span> / <span id="download-total">0</span>
                </div>
                <div class="download-filename" id="download-filename"></div>
                <div class="download-progress-bar">
                    <div class="download-progress-fill" id="download-progress-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-overlay" class="settings-overlay" style="display:none">
        <div class="settings-panel">
            <div class="settings-header">
                <h2>Settings</h2>
                <button id="settings-close" class="settings-close-btn" title="Close">✕</button>
            </div>
            <div class="settings-body">
                <!-- Cache section -->
                <div class="settings-section">
                    <h3>Thumbnail Cache</h3>
                    <div class="settings-row">
                        <span class="settings-label">Cached files:</span>
                        <span id="settings-cache-count">—</span>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">Cache size:</span>
                        <span id="settings-cache-size">—</span>
                    </div>
                    <button id="settings-clear-cache" class="settings-btn settings-btn-danger">Clear Cache</button>
                </div>

                <!-- Preview size section -->
                <div class="settings-section">
                    <h3>Viewer Preview Size</h3>
                    <p class="settings-desc">Long edge pixel size for the viewer image. Smaller = faster load, larger = more detail.</p>
                    <select id="settings-preview-size" class="settings-select">
                        <option value="512">512 px</option>
                        <option value="1024" selected>1024 px (default)</option>
                        <option value="2048">2048 px</option>
                        <option value="0">Original size</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
